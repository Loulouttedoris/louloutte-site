<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Live de Louloutte</title>

    <style>

        /* --- BACKGROUND FIX MOBILE + PC --- */
        body {
            margin: 0;
            background-image: url("https://loulouttedoris.github.io/louloutte-site/background.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: scroll;
            color: white;
            font-family: Arial;
            text-align: center;
            position: relative;
            min-height: 100vh;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Overlay noir */
        body::before {
            content: "";
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Transition */
        html {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        html.loaded { opacity: 1; }

        /* NAVIGATION */
        nav {
            text-align: center;
            padding: 20px;
            background: rgba(17, 17, 17, 0.8);
        }
        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }
        nav a:hover {
            color: #9146FF;
            text-shadow: 0 0 10px #9146FF;
        }

        /* TITRE */
        h1 {
            margin-top: 60px;
            font-size: 40px;
            color: #9146FF;
            text-shadow: 0 0 6px #9146FF;
            transition: 0.3s ease;
        }
        h1:hover {
            color: #b57aff;
            text-shadow: 0 0 12px #b57aff, 0 0 25px #d2a8ff;
            transform: scale(1.05);
        }

        /* PLAYER TWITCH */
        .player-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        iframe {
            border: 4px solid #9146FF;
            border-radius: 10px;
            box-shadow: 0 0 20px #9146FF;
            transition: 0.3s ease;
            max-width: 100%;
        }

        iframe:hover {
            box-shadow: 0 0 25px #b57aff, 0 0 40px #d2a8ff;
            transform: scale(1.02);
        }

        /* RESPONSIVE */
        @media (max-width: 700px) {
            h1 { font-size: 32px; margin-top: 40px; }
            nav a { display: block; margin: 10px 0; font-size: 22px; }
            iframe { width: 100%; height: 300px; }
        }

        /* ANIMATION */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>

<body>

<nav>
    <a href="/louloutte-site/index.html">Accueil</a>
    <a href="/louloutte-site/team.html">Affiliés Twitch</a>
    <a href="/louloutte-site/louloutte.html">Mon Live</a>
</nav>

<h1>Mon Live Twitch 🎥</h1>

<div class="player-container">
    <iframe
        src="https://player.twitch.tv/?channel=louloutte_doris&parent=loulouttedoris.github.io"
        height="500"
        width="900"
        allowfullscreen>
    </iframe>
</div>

<script>
    window.onload = () => document.documentElement.classList.add('loaded');
</script>

</body>
</html>
