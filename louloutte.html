<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Live de Louloutte</title>

    <style>

        /* --- BACKGROUND --- */
        body {
            margin: 0;
            background: url('/louloutte-site/background.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: Arial;
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease-in-out;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* --- TRANSITION ENTRE PAGES --- */
        html {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        html.loaded {
            opacity: 1;
        }

        /* --- NAVIGATION --- */
        nav {
            text-align: center;
            padding: 20px;
            background: rgba(17, 17, 17, 0.8);
        }

        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #9146FF;
            text-shadow: 0 0 10px #9146FF;
        }

        /* --- TITRE AVEC GLOW --- */
        h1 {
            margin-top: 60px;
            font-size: 40px;
            color: #9146FF;
            text-shadow: 0 0 6px #9146FF;
            transition: 0.3s ease;
        }

        h1:hover {
            color: #b57aff;
            text-shadow:
                0 0 12px #b57aff,
                0 0 25px #d2a8ff;
            transform: scale(1.05);
        }

        /* --- LECTEUR TWITCH --- */
        .player-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
        }

        iframe {
            border: 4px solid #9146FF;
            border-radius: 10px;
            box-shadow: 0 0 20px #9146FF;
            transition: 0.3s ease;
        }

        iframe:hover {
            box-shadow:
                0 0 25px #b57aff,
                0 0 40px #d2a8ff;
            transform: scale(1.02);
        }

        /* --- ANIMATION PAGE --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

    </style>
</head>

<body>

<nav>
    <a href="/louloutte-site/index.html">Accueil</a>
    <a href="/louloutte-site/team.html">Team</a>
    <a href="/louloutte-site/louloutte.html">Mon Live</a>
</nav>

<h1>Mon Live Twitch 🎥</h1>

<div class="player-container">
    <iframe
        src="https://player.twitch.tv/?channel=louloutte_doris&parent=loulouttedoris.github.io"
        height="500"
        width="900"
        allowfullscreen>
    </iframe>
</div>

<script>
    window.onload = () => {
        document.documentElement.classList.add('loaded');
    };
</script>

</body>
</html>
