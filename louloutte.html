<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Louloutte - Live</title>
    <style>
        body { margin:0; background:#0d0d0d; color:white; font-family:Arial; text-align:center; }
        nav { text-align:center; padding:20px; background:#111; }
        nav a { color:white; margin:0 20px; text-decoration:none; font-size:20px; }
        nav a:hover { color:#9146FF; }
        h1 { margin-top:40px; color:#9146FF; }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Accueil</a>
    <a href="team.html">Team Louloutte</a>
</nav>

<h1>Live de Louloutte</h1>

<!-- ICI : le conteneur qui affichera soit le live, soit la bannière -->
<div id="live-container"></div>

<script>
async function checkLive() {
    const user = "louloutte_doris";
    const url = `https://api.twitch.tv/kraken/streams/${user}?client_id=kimne78kx3ncx6brgo4mv6wki5h1ko&api_version=5`;

    const response = await fetch(url);
    const data = await response.json();

    const container = document.getElementById("live-container");

    if (data.stream) {
        container.innerHTML = `
            <iframe
                src="https://player.twitch.tv/?channel=${user}&parent=loulouttedoris.github.io"
                frameborder="0"
                allowfullscreen="true"
                scrolling="no"
                height="378"
                width="620">
            </iframe>
        `;
    } else {
        container.innerHTML = `
            <img src="banniere.webp" style="width:80%; border-radius:10px; margin-top:20px;">
        `;
    }
}

checkLive();
</script>

</body>
</html>
