<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Affiliés</title>
    <style>

        body {
            margin: 0;
            background: url('/louloutte-site/background.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        nav {
            text-align: center;
            padding: 20px;
            background: rgba(17, 17, 17, 0.8);
        }

        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #9146FF;
            text-shadow: 0 0 10px #9146FF;
        }

        /* --- TITRE AVEC HOVER --- */
        h1 {
            margin-top: 40px;
            font-size: 40px;
            color: #9146FF;
            text-shadow: 0 0 6px #9146FF;
            transition: 0.3s ease;
        }

        h1:hover {
            color: #b57aff;
            text-shadow:
                0 0 12px #b57aff,
                0 0 25px #d2a8ff;
            transform: scale(1.05);
        }

        /* --- TEAM --- */
        .team-container {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .member {
            text-align: center;
        }

        /* --- AVATAR AVEC HOVER --- */
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #9146FF;
            object-fit: cover;
            transition: 0.3s ease;
            box-shadow: 0 0 6px #9146FF;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow:
                0 0 12px #b57aff,
                0 0 25px #d2a8ff;
            border-color: #b57aff;
        }

        /* --- NOM AVEC HOVER --- */
        .name {
            margin-top: 15px;
            font-size: 20px;
            color: white;
            transition: 0.3s ease;
            text-shadow: 0 0 6px #9146FF;
        }

        .name:hover {
            color: #b57aff;
            text-shadow:
                0 0 12px #b57aff,
                0 0 25px #d2a8ff;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<nav>
    <a href="/louloutte-site/index.html">Accueil</a>
    <a href="/louloutte-site/louloutte.html">Mon Live</a>
</nav>

            <img class="avatar" src="louloutte1.png">
            <div class="name">Louloutte_doris</div>
        </a>
    </div>

    <div class="member">
        <a href="https://www.twitch.tv/adren4line_" target="_blank">
            <img class="avatar" src="adré.jpg">
            <div class="name">Adren4line_</div>
        </a>
    </div>

    <div class="member">
        <a href="https://www.twitch.tv/steroban_tv" target="_blank">
            <img class="avatar" src="steroban.jpg">
            <div class="name">Steroban_tv</div>
        </a>
    </div>

</div>

</body>
</html>
