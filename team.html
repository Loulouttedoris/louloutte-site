<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Affiliés</title>

    <style>
        /* --- BACKGROUND --- */
        body {
            margin: 0;
            background: url('/louloutte-site/background.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: Arial;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* --- TRANSITION ENTRE PAGES --- */
        html {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        html.loaded {
            opacity: 1;
        }

        /* --- NAVIGATION --- */
        nav {
            text-align: center;
            padding: 20px;
            background: rgba(17, 17, 17, 0.8);
        }

        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #9146FF;
            text-shadow: 0 0 10px #9146FF;
        }

        /* --- TITRE --- */
        h1 {
            margin-top: 40px;
            font-size: 40px;
            color: #9146FF;
            text-shadow: 0 0 6px #9146FF;
        }

        /* --- AVATARS --- */
        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #9146FF;
            box-shadow: 0 0 15px #9146FF;
            transition: 0.3s ease;
            margin: 20px;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #b57aff, 0 0 40px #d2a8ff;
        }

        /* --- CERCLE ROUGE PULSANT SI LIVE --- */
        .live {
            border-color: red !important;
            box-shadow: 0 0 15px red, 0 0 30px red;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px red; }
            50% { box-shadow: 0 0 25px red; }
            100% { box-shadow: 0 0 10px red; }
        }
    </style>
</head>

<body>

<nav>
    <a href="/louloutte-site/index.html">Accueil</a>
    <a href="/louloutte-site/team.html">Team</a>
    <a href="/louloutte-site/louloutte.html">Mon Live</a>
</nav>

<h1>Affiliés</h1>

<!-- AVATARS AVEC IDs -->
<img class="avatar" id="avatar-louloutte" src="/louloutte-site/louloutte1.png">
<img class="avatar" id="avatar-adre" src="/louloutte-site/adré.jpg">
<img class="avatar" id="avatar-stero" src="/louloutte-site/steroban.jpg">

<script>
/* Liste des streamers */
const streamers = [
    { name: "louloutte_doris", element: "avatar-louloutte" },
    { name: "adren4line_", element: "avatar-adre" },
    { name: "steroban_tv", element: "avatar-stero" }
];

/* API sécurisée (ne montre pas ton secret) */
const API_URL = "https://decapi.me/twitch/uptime/";

/* Vérifie si les streamers sont en live */
async function checkLive() {
    for (const s of streamers) {
        const res = await fetch(API_URL + s.name);
        const text = await res.text();

        if (!text.includes("offline")) {
            document.getElementById(s.element).classList.add("live");
        }
    }
}

checkLive();

/* Transition page */
window.onload = () => {
    document.documentElement.classList.add('loaded');
};
</script>

</body>
</html>
