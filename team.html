<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Team Louloutte</title>
    <style>
        body { margin:0; background:#0d0d0d; color:white; font-family:Arial; }
        nav { text-align:center; padding:20px; background:#111; }
        nav a { color:white; margin:0 20px; text-decoration:none; font-size:20px; }
        nav a:hover { color:#9146FF; }
        h1 { text-align:center; margin-top:40px; color:#9146FF; }

        .team-container {
            display:flex;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
            padding:40px;
        }

        .card {
            background:#1a1a1a;
            width:260px;
            padding:20px;
            border-radius:15px;
            text-align:center;
            border:2px solid #9146FF;
            transition:0.3s;
        }

        .card:hover {
            transform:scale(1.05);
            box-shadow:0 0 20px #9146FF;
        }

        .avatar {
            width:120px;
            height:120px;
            border-radius:50%;
            background:#333;
            margin:auto;
            margin-bottom:15px;
            border:3px solid #9146FF;
        }

        .btn {
            display:inline-block;
            margin-top:15px;
            padding:10px 20px;
            background:#9146FF;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover {
            background:white;
            color:#9146FF;
        }
    </style>
</head>

<body>

<nav>

    </div>

</body>
</html>
