<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Affiliés</title>

    <style>
        body {
            margin: 0;
            background-image: url("https://loulouttedoris.github.io/louloutte-site/background.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: scroll;
            color: white;
            font-family: Arial;
            text-align: center;
            position: relative;
            min-height: 100vh;
            animation: fadeIn 0.8s ease-in-out;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        html {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        html.loaded { opacity: 1; }

        nav {
            text-align: center;
            padding: 20px;
            background: rgba(17, 17, 17, 0.8);
        }
        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }
        nav a:hover {
            color: #9146FF;
            text-shadow: 0 0 10px #9146FF;
        }

        h1 {
            margin-top: 40px;
            font-size: 40px;
            color: #9146FF;
            text-shadow: 0 0 12px #9146FF, 0 0 25px #b57aff;
        }

        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #9146FF;
            box-shadow: 0 0 15px #9146FF;
            transition: 0.3s ease;
            margin: 20px;
            object-fit: cover;
        }
        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #b57aff, 0 0 40px #d2a8ff;
        }

        .name {
            font-size: 22px;
            margin-top: 10px;
            color: #ffffff;
            text-shadow: 0 0 12px #9146FF, 0 0 25px #b57aff;
        }

        .twitch-link {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        .twitch-icon {
            width: 45px;
            filter: drop-shadow(0 0 8px #9146FF);
            transition: 0.3s ease;
        }
        .twitch-icon:hover {
            transform: scale(1.18);
            filter: drop-shadow(0 0 14px #b57aff) drop-shadow(0 0 28px #d2a8ff);
        }

        .live {
            border-color: red !important;
            box-shadow: 0 0 15px red, 0 0 30px red;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px red; }
            50% { box-shadow: 0 0 25px red; }
            100% { box-shadow: 0 0 10px red; }
        }

        @media (max-width: 700px) {
            h1 { font-size: 32px; }
            nav a { display: block; margin: 10px 0; font-size: 22px; }
            .avatar { width: 150px; height: 150px; }
            .name { font-size: 20px; }
            .container { flex-direction: column; gap: 20px; }
        }
    </style>
</head>

<body>

<nav>
    <a href="/louloutte-site/index.html">Accueil</a>
    <a href="/louloutte-site/team.html">Affiliés Twitch</a>
    <a href="/louloutte-site/louloutte.html">Mon Live</a>
</nav>

<h1>Affiliés</h1>

<div class="container" style="display:flex; justify-content:center; gap:60px; margin-top:40px; flex-wrap:wrap;">

    <div>
        <img class="avatar" id="avatar-louloutte" src="">
        <p class="name">Louloutte_doris</p>
        <a href="https://twitch.tv/louloutte_doris" target="_blank" class="twitch-link">
            <img src="https://loulouttedoris.github.io/louloutte-site/logo.png" class="twitch-icon">
        </a>
    </div>

    <div>
        <img class="avatar" id="avatar-adre" src="">
        <p class="name">Adren4line</p>
        <a href="https://twitch.tv/adren4line_" target="_blank" class="twitch-link">
            <img src="https://loulouttedoris.github.io/louloutte-site/logo.png" class="twitch-icon">
        </a>
    </div>

    <div>
        <img class="avatar" id="avatar-stero" src="">
        <p class="name">Steroban_tv</p>
        <a href="https://twitch.tv/steroban_tv" target="_blank" class="twitch-link">
            <img src="https://loulouttedoris.github.io/louloutte-site/logo.png" class="twitch-icon">
        </a>
    </div>

    <div>
        <img class="avatar" id="avatar-seri" src="">
        <p class="name">Serizawa5714</p>
        <a href="https://twitch.tv/serizawa5714" target="_blank" class="twitch-link">
            <img src="https://loulouttedoris.github.io/louloutte-site/logo.png" class="twitch-icon">
        </a>
    </div>

</div>

<script>
const streamers = [
    { name: "louloutte_doris", element: "avatar-louloutte" },
    { name: "adren4line_", element: "avatar-adre" },
    { name: "steroban_tv", element: "avatar-stero" },
    { name: "serizawa5714", element: "avatar-seri" }
];

const API_UPTIME = "https://decapi.me/twitch/uptime/";
const API_AVATAR = "https://decapi.me/twitch/avatar/";

async function loadAvatars() {
    for (const s of streamers) {
        document.getElementById(s.element).src = API_AVATAR + s.name;
    }
}

async function checkLive() {
    for (const s of streamers) {
        const res = await fetch(API_UPTIME + s.name);
        const text = await res.text();

        if (!text.includes("offline")) {
            const avatar = document.getElementById(s.element);
            avatar.classList.add("live");

            avatar.style.cursor = "pointer";
            avatar.onclick = () => window.open("https://twitch.tv/" + s.name, "_blank");

            const nameElement = avatar.parentElement.querySelector(".name");
            nameElement.style.cursor = "pointer";
            nameElement.onclick = () => window.open("https://twitch.tv/" + s.name, "_blank");

            nameElement.textContent += " – en live";
        }
    }
}

loadAvatars();
checkLive();

window.onload = () => document.documentElement.classList.add('loaded');
</script>

</body>
</html>
