<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil - Louloutte</title>
    <style>

        /* --- BACKGROUND --- */
        body {
            margin: 0;
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: Arial;
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease-in-out;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* --- TRANSITION ENTRE PAGES --- */
        html {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        html.loaded {
            opacity: 1;
        }

        /* --- NAVIGATION --- */
        nav {
            text-align: center;
            padding: 20px;
            background: rgba(17, 17, 17, 0.8);
        }

        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #9146FF;
            text-shadow: 0 0 10px #9146FF;
        }

        /* --- TITRE NÉON --- */
        h1 {
            margin-top: 60px;
            font-size: 40px;
            color: #9146FF;
            text-shadow: 0 0 10px #9146FF, 0 0 20px #9146FF, 0 0 40px #b57aff;
            animation: neonPulse 2s infinite alternate;
        }

        @keyframes neonPulse {
            from {
                text-shadow: 0 0 10px #9146FF, 0 0 20px #9146FF, 0 0 40px #b57aff;
            }
            to {
                text-shadow: 0 0 20px #b57aff, 0 0 40px #d2a8ff, 0 0 60px #ffffff;
            }
        }

        /* --- TEXTE --- */
        p {
            font-size: 20px;
            margin-top: 20px;
            color: #ccc;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .cta {
            font-size: 22px;
            margin-top: 25px;
            font-weight: bold;
            color: white;
        }
