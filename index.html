<!DOCTYPE html>

    <style>

        /* --- BACKGROUND --- */
        body {
            margin: 0;
            background: url('/louloutte-site/background.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: Arial;
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease-in-out;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* --- TRANSITION ENTRE PAGES --- */
        html {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        html.loaded {
            opacity: 1;
        }

            text-align: center;

            background: rgba(17, 17, 17, 0.8);

            font-size: 20px;
            transition: 0.3s;
        }
